name = "nagaraj-chat"
main = "src/index.js"
compatibility_date = "2025-01-01"
workers_dev = true

# Cloudflare Workers AI binding (free tier). No API key needed.
[ai]
binding = "AI"

[vars]
# Origins allowed to call this Worker (comma-separated). Update if your domain changes.
ALLOWED_ORIGINS = "https://www.nagaraj.com.au,https://nagaraj.com.au,http://localhost:4321"
# Model to use — any Workers AI text model. Swap if you prefer another.
MODEL = "@cf/meta/llama-3.1-8b-instruct"

# Per-IP rate limit (free). 15 requests / 60s per IP. The Worker uses this only
# if the binding deploys; if your wrangler errors on it, comment this block out
# and rate-limiting is simply skipped (origin + Turnstile still apply).
[[unsafe.bindings]]
name = "RATE_LIMITER"
type = "ratelimit"
namespace_id = "1001"
simple = { limit = 15, period = 60 }

# Turnstile: do NOT put the secret here. Set it as an encrypted secret:
#   npx wrangler secret put TURNSTILE_SECRET
# When that secret exists, the Worker requires a valid Turnstile token.
